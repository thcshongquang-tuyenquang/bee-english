<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Đăng ký - bee-english</title>
    <link rel="icon" type="image/svg+xml" href="https://learnenglishwithaurora.github.io/aurora.svg" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            font-family: 'Inter', system-ui, Avenir, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            font-weight: 400;
            color-scheme: light;
            font-synthesis: none;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.6)), 
                        url('https://i.postimg.cc/pV8cRV0q/z7661851515824-697191548b7f61fce0f4c0a12536ee69.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
        }

        /* Lớp phụ trợ tăng độ tương phản nếu cần, nhưng gradient đã đủ */
        .register-container {
            background-color: rgba(255, 255, 255, 0.96);
            border-radius: 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 215, 0, 0.3);
            padding: 40px 35px;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(0px);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.3s;
            border: 1px solid rgba(255, 215, 0, 0.6);
        }

        .register-container:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            border-color: #FFD700;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            height: 80px;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .logo h1 {
            color: #FFD700;
            margin: 8px 0 5px;
            font-size: 30px;
            font-weight: 800;
            text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.15);
            letter-spacing: -0.5px;
        }

        .welcome-text {
            text-align: center;
            color: #2c3e4e;
            margin-bottom: 28px;
            font-size: 16px;
            line-height: 1.5;
            font-weight: 500;
            background: rgba(255, 248, 205, 0.5);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 16px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e2a36;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.25s ease;
            background-color: white;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.25);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(105deg, #FFD700 0%, #FFB347 100%);
            color: #2c2b28;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            margin-top: 12px;
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(255, 200, 0, 0.35);
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #FFE055 0%, #FFA559 100%);
            box-shadow: 0 12px 22px rgba(255, 180, 0, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        .links {
            text-align: center;
            margin-top: 28px;
        }

        .links a {
            color: #D48F2B;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-block;
            margin: 8px 12px;
            font-size: 0.9rem;
            background: rgba(255,245,200,0.4);
            padding: 4px 12px;
            border-radius: 40px;
        }

        .links a:hover {
            color: #B45F1B;
            text-decoration: none;
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.02);
        }

        .error {
            color: #d32f2f;
            margin-top: 18px;
            text-align: center;
            padding: 12px;
            background-color: #ffeaea;
            border-radius: 30px;
            border-left: 4px solid #ff4d4d;
            font-weight: 500;
            font-size: 14px;
        }

        .password-requirements {
            font-size: 12px;
            color: #4b6a7c;
            margin-top: 6px;
            margin-left: 6px;
        }

        /* Responsive tinh tế */
        @media (max-width: 520px) {
            .register-container {
                margin: 20px;
                padding: 30px 22px;
                max-width: 92%;
            }
            
            .logo img {
                height: 65px;
            }
            
            .logo h1 {
                font-size: 26px;
            }

            .welcome-text {
                font-size: 14px;
            }
        }

        /* Hiệu ứng loading cho button */
        button:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <img src="https://learnenglishwithaurora.github.io/aurora.svg" alt="Niceng Logo">
            <h1>bee-english</h1>
            <div class="welcome-text">
                🌟 Bắt đầu hành trình học tiếng Anh của bạn ngay hôm nay 🌟
            </div>
        </div>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">👤 Họ và tên</label>
                <input type="text" id="name" required placeholder="Nguyễn Văn A" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" required placeholder="example@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">🔒 Mật khẩu</label>
                <input type="password" id="password" required minlength="6" placeholder="••••••" autocomplete="new-password">
                <div class="password-requirements">✔️ Mật khẩu phải có ít nhất 6 ký tự</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">✅ Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" required placeholder="Nhập lại mật khẩu" autocomplete="off">
            </div>
            <button type="submit" id="submitBtn">✨ Đăng ký ngay ✨</button>
            <div class="links">
                <a href="login.html">🔑 Đã có tài khoản? Đăng nhập</a>
                <a href="index.html">🏠 Quay lại trang chủ</a>
            </div>
        </form>
        <div id="errorMessage" class="error"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <script>
        // Firebase configuration (giữ nguyên thông tin từ code gốc)
        const firebaseConfig = {
            apiKey: "AIzaSyBc55gGulDbOCgGp2USL_HXeVLwqqXFTTU",
            authDomain: "niceng-c235d.firebaseapp.com",
            projectId: "niceng-c235d",
            storageBucket: "niceng-c235d.firebasestorage.app",
            messagingSenderId: "532991375524",
            appId: "1:532991375524:web:699b2e9f5b1bf727d68e31",
            measurementId: "G-PDZ20PLN86"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        } else {
            firebase.app(); // sử dụng app đã khởi tạo
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // DOM elements
        const registerForm = document.getElementById('registerForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const errorDiv = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        // Helper: xóa thông báo lỗi cũ khi người dùng nhập lại
        const clearError = () => {
            errorDiv.textContent = '';
        };

        // Thêm sự kiện focus để xóa lỗi mềm mại
        const inputs = [nameInput, emailInput, passwordInput, confirmInput];
        inputs.forEach(inp => {
            inp.addEventListener('focus', clearError);
            inp.addEventListener('input', clearError);
        });

        // Xử lý submit form đăng ký
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;

            // Validate cơ bản
            if (!name) {
                errorDiv.textContent = "❌ Vui lòng nhập họ và tên.";
                nameInput.focus();
                return;
            }
            if (!email) {
                errorDiv.textContent = "❌ Vui lòng nhập địa chỉ email.";
                emailInput.focus();
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = "❌ Mật khẩu phải có ít nhất 6 ký tự.";
                passwordInput.focus();
                return;
            }
            if (password !== confirmPassword) {
                errorDiv.textContent = "❌ Mật khẩu xác nhận không khớp!";
                confirmInput.focus();
                return;
            }

            // Hiệu ứng loading
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '⏳ Đang xử lý đăng ký...';
            submitBtn.disabled = true;

            try {
                // Tạo user với email + password
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Lưu thông tin vào Firestore
                await db.collection('users').doc(user.uid).set({
                    name: name,
                    email: email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    role: 'user',
                    avatar: null,
                    lastActive: new Date()
                });

                // Chuyển hướng sang main.html (trang chính sau đăng ký)
                window.location.href = 'main.html';
                
            } catch (error) {
                // Hiển thị lỗi chi tiết từ Firebase (dễ hiểu hơn)
                let friendlyMsg = '';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        friendlyMsg = '📛 Email này đã được đăng ký. Vui lòng sử dụng email khác hoặc đăng nhập.';
                        break;
                    case 'auth/invalid-email':
                        friendlyMsg = '📧 Địa chỉ email không hợp lệ. Hãy kiểm tra lại!';
                        break;
                    case 'auth/weak-password':
                        friendlyMsg = '🔐 Mật khẩu quá yếu. Hãy chọn mật khẩu dài hơn (tối thiểu 6 ký tự).';
                        break;
                    case 'auth/network-request-failed':
                        friendlyMsg = '🌐 Lỗi kết nối mạng. Vui lòng kiểm tra internet và thử lại.';
                        break;
                    default:
                        friendlyMsg = `⚠️ Đăng ký thất bại: ${error.message}`;
                }
                errorDiv.textContent = friendlyMsg;
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
